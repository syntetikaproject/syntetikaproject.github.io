<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Syntetika Project</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/blog.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../" class="nav-logo">Syntetika</a>
            <ul class="nav-menu">
                <li><a href="../">Home</a></li>
                <li><a href="../projects.html">Projects</a></li>
                <li><a href="index.html" class="active">Blog</a></li>
                <li><a href="../#contact">Contact</a></li>
            </ul>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Blog</h1>
            <p>Catatan eksperimen, pameran, proses kreatif & behind the scenes.</p>
        </div>
    </section>

    <section class="blog-list-section">
        <div class="container">
            <div class="blog-grid" id="blog-grid">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading posts...</div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-brand">
                <span class="footer-logo">Syntetika</span>
                <p>Project by Danartri — Experimental tools & multimedia experiences.</p>
                <a href="../Lampiran/Danar%20Syntetika%20Profile.pdf" target="_blank" rel="noopener" class="footer-cv">
                    <i class="fas fa-file-pdf"></i> Download Profile (PDF)
                </a>
            </div>
            <div class="footer-socials">
                <a href="https://github.com/danartriyudistira" target="_blank" rel="noopener"><i class="fab fa-github"></i></a>
                <a href="https://instagram.com/synt.etika" target="_blank" rel="noopener"><i class="fab fa-instagram"></i></a>
                <a href="#" target="_blank" rel="noopener"><i class="fab fa-youtube"></i></a>
            </div>
            <p class="footer-copy">&copy; 2026 Syntetika Project. Built with <i class="fas fa-heart"></i> and curiosity.</p>
        </div>
    </footer>

    <a href="#" class="back-to-top" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </a>

    <script src="../js/blog.js"></script>
    <script src="../js/script.js"></script>
    <script>
    (async () => {
        const grid = document.getElementById('blog-grid');
        try {
            const posts = await fetchPosts();
            if (posts.length === 0) {
                grid.innerHTML = '<div class="empty">Belum ada post. Posting pertama akan muncul di sini.</div>';
                return;
            }
            grid.innerHTML = posts.map(p => `
                <article class="blog-card">
                    <div class="blog-card-meta">
                        ${p.labels.map(l => `<span class="blog-label" style="background:#${l.color}20;color:#${l.color};border-color:#${l.color}40">${l.name}</span>`).join('')}
                        <time>${formatDate(p.date)}</time>
                    </div>
                    <h2><a href="post.html?id=${p.id}">${p.title}</a></h2>
                    <p class="blog-excerpt">${stripHtml(renderMarkdown(p.body))}</p>
                    <a href="post.html?id=${p.id}" class="blog-read-more">Baca selengkapnya <i class="fas fa-arrow-right"></i></a>
                </article>
            `).join('');
        } catch (e) {
            grid.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle"></i> Gagal memuat post. <button onclick="location.reload()">Coba lagi</button></div>`;
            console.error(e);
        }
    })();
    </script>
</body>
</html>
